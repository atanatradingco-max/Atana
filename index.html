<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آتانا ERP - ثبت بار ارسالی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Top Section */
        .select-customer {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .btn-full {
            width: 100%;
            background-color: #3170b9;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .selected-customer-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            color: #4b5563;
        }

        .tab.active {
            background-color: #3170b9;
            color: white;
        }

        /* Form Container */
        .form-container {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
        }

        .form-header {
            font-size: 16px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Grid Layout */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            text-align: right;
        }

        .form-group input:focus {
            border-color: #3170b9;
            box-shadow: 0 0 0 2px rgba(49, 112, 185, 0.2);
        }

        /* Footer Link */
        .footer-link {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            font-weight: bold;
            color: #1e3a8a;
            font-size: 14px;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .grid-4 { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <select class="select-customer">
        <option>علی حسن‌زاده Niari (ATC-101)</option>
    </select>
    
    <button class="btn-full">👤 تعریف پرونده مشتری جدید</button>
    
    <div class="selected-customer-box">
        <span>صنف: کارگو و بازرگانی (Atana Trading)</span>
        <span style="font-size: 16px;">پرونده منتخب: <strong>علی حسن‌زاده Niari</strong></span>
    </div>

    <div class="tabs">
        <a href="#" class="tab">🧾 صدور فاکتور / ثبت سند مالی</a>
        <a href="#" class="tab active">📦 ارسال بار جدید (لجستیک چین)</a>
        <a href="#" class="tab">🚚 بارهای ارسال‌شده مشتری</a>
    </div>

    <div class="form-container">
        <div class="form-header">📦 ثبت بار ارسالی جدید (لجستیک چین) و تولید اتوماتیک بدهی و کشتیرانی</div>
        
        <div class="grid-4">
            <div class="form-group">
                <label>کد رهگیری شیپمنت (Shipment Code)</label>
                <input type="text" value="125">
            </div>
            <div class="form-group">
                <label>شماره فاکتور / شماره سند (Invoice No)</label>
                <input type="text" value="255">
            </div>
            <div class="form-group">
                <label>نام و شرح کالا</label>
                <input type="text" value="harhci">
            </div>
            <div class="form-group">
                <label>تعداد کارتن (عدد)</label>
                <input type="text" value="5">
            </div>

            <div class="form-group">
                <label>وزن بار (کیلوگرم)</label>
                <input type="text" value="2500">
            </div>
            <div class="form-group">
                <label>حجم بار (CBM - متر مکعب)</label>
                <input type="text" value="5">
            </div>
            <div class="form-group">
                <label>نرخ اعلامی به مشتری (یوان)</label>
                <input type="text" value="500">
            </div>
            <div class="form-group">
                <label>نام خط کشتیرانی (Shipping Line)</label>
                <input type="text" value="liang">
            </div>

            <div class="form-group">
                <label>نرخ کشتیرانی به من (خرید ما - یوان)</label>
                <input type="text" value="400">
            </div>
            <div class="form-group">
                <label>هزینه داخلی چین (یوان)</label>
                <input type="text" value="50">
            </div>
            <div class="form-group">
                <label>هزینه داخلی مقصد / ترخیص (تومان)</label>
                <input type="text" value="0">
            </div>
            <div class="form-group">
                </div>
        </div>

        <button class="btn-full" style="margin-bottom: 0;">ارسال نهایی بار و ثبت زنجیره‌ای اسناد مالی</button>
    </div>

    <div class="footer-link">
        📊 گردش تفصیلی پرونده مشتری فعال
    </div>
</div>

</body>
</html>
