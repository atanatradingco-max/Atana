<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت آتانا کارگو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- اتصال به فایربیس اختصاصی شما -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // تنظیمات دیتابیس اختصاصی علی حسن‌زاده
        const firebaseConfig = {
          apiKey: "AIzaSyAD9pbJbfz5i2rkdldTUeFc7GvCmgd2PrA",
          authDomain: "atana-d41d7.firebaseapp.com",
          projectId: "atana-d41d7",
          storageBucket: "atana-d41d7.firebasestorage.app",
          messagingSenderId: "735986567605",
          appId: "1:735986567605:web:fdb82e9b1c4bf3d726b1fc"
        };

        // راه‌اندازی فایربیس
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;

        // ورود هوشمند به سیستم
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('status').innerText = "خطا در اتصال! لطفاً مطمئن شوید ورود Anonymous را در فایربیس فعال کرده‌اید.";
                document.getElementById('status').className = "mt-4 text-center font-bold text-red-600";
            }
        };

        // گوش دادن به وضعیت ورود و بارگذاری اطلاعات
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadData();
            }
        });

        initAuth();

        // مسیر ذخیره‌سازی داده‌های شما
        const getCollectionRef = () => {
            return collection(db, 'artifacts', 'atana-cargo', 'users', currentUser.uid, 'transactions');
        };

        // تابع دریافت لیست بارها از دیتابیس
        function loadData() {
            if (!currentUser) return;
            
            const colRef = getCollectionRef();
            
            onSnapshot(colRef, (snapshot) => {
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = '';
                let hasData = false;

                const items = [];
                snapshot.forEach(doc => {
                    items.push({ id: doc.id, ...doc.data() });
                });
                
                // مرتب‌سازی: جدیدترین‌ها در بالا
                items.sort((a, b) => b.timestamp - a.timestamp);

                items.forEach(data => {
                    hasData = true;
                    listDiv.innerHTML += `
                        <div class="p-4 bg-gray-50 rounded-lg flex justify-between items-center border border-gray-200 mb-3 shadow-sm hover:shadow-md transition">
                            <p class="font-bold text-gray-800">${data.desc}</p>
                            <span class="font-bold text-blue-800 bg-blue-100 px-4 py-1 rounded-full text-sm">${data.amount} یوان</span>
                        </div>`;
                });

                if (!hasData) {
                    listDiv.innerHTML = '<p class="text-center text-gray-500 mt-4">هنوز باری ثبت نکرده‌اید.</p>';
                }
            }, (error) => {
                console.error("Firestore Error:", error);
                document.getElementById('list').innerHTML = `<p class="text-red-500 text-center text-sm">خطا در دریافت اطلاعات. آیا بخش Rules دیتابیس را ویرایش کرده‌اید؟</p>`;
            });
        }

        // تابع ذخیره بار جدید
        window.saveData = async () => {
            const status = document.getElementById('status');
            
            if (!currentUser) {
                status.innerText = "در حال اتصال به دیتابیس شما، لطفا صبر کنید...";
                status.className = "mt-4 text-center font-bold text-amber-600";
                return;
            }

            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;

            if(!desc || !amount) {
                status.innerText = "لطفاً هم نام کالا و هم مبلغ را وارد کنید!";
                status.className = "mt-4 text-center font-bold text-red-600";
                return;
            }

            status.innerText = "در حال ذخیره در دیتابیس اختصاصی شما...";
            status.className = "mt-4 text-center font-bold text-blue-600";

            try {
                const colRef = getCollectionRef();
                await addDoc(colRef, { 
                    desc: desc, 
                    amount: Number(amount),
                    timestamp: new Date().getTime() 
                });
                
                status.innerText = "✅ بار با موفقیت در سیستم ثبت شد!";
                status.className = "mt-4 text-center font-bold text-green-600";
                
                document.getElementById('desc').value = '';
                document.getElementById('amount').value = '';
                
                setTimeout(() => { status.innerText = ""; }, 3000);
            } catch (error) {
                console.error("Save Error:", error);
                status.innerText = "خطا در ثبت! (مطمئن شوید کدهای Rules در دیتابیس درست است)";
                status.className = "mt-4 text-center font-bold text-red-600";
            }
        };
    </script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-xl border">
        <div class="flex justify-center mb-4">
            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">Atana Cargo Cloud</span>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold mb-8 text-gray-800 text-center border-b pb-4">پنل مدیریت آتانا کارگو</h1>
        
        <!-- فرم ثبت بار -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">نام کالا (شرح بار)</label>
                <input id="desc" class="p-3 border rounded-lg w-full focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" placeholder="مثلاً: لوازم جانبی موبایل">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">مبلغ (به یوان)</label>
                <input id="amount" type="number" class="p-3 border rounded-lg w-full focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" placeholder="مثلاً: 1500">
            </div>
        </div>
        
        <button onclick="saveData()" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-800 transition shadow-md">ثبت بار در دیتابیس</button>

        <div id="status" class="mt-4 text-center font-bold text-sm h-6"></div>

        <!-- لیست بارها -->
        <div class="mt-8">
            <h2 class="font-bold text-lg mb-4 text-gray-800 border-b pb-2">بارهای ثبت شده در سیستم</h2>
            <div id="list" class="space-y-3">
                <p class="text-gray-400 text-center mt-4">در حال برقراری ارتباط با سرور فایربیس...</p>
            </div>
        </div>
    </div>
</body>
</html>
