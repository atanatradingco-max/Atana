<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آتانا ERP - مدیریت کارگو و حسابداری</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Top Section */
        .select-customer {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .btn-full {
            width: 100%;
            background-color: #3170b9;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .btn-dark {
            background-color: #1e3a8a; /* رنگ دکمه مالی که تیره‌تر است */
        }

        .selected-customer-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            color: #4b5563;
            transition: background-color 0.2s;
        }

        .tab.active {
            background-color: #3170b9;
            color: white;
        }

        /* Form Container */
        .form-container {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            display: none; /* پیش‌فرض مخفی تا با جاوااسکریپت کنترل شود */
        }

        .form-container.active-form {
            display: block; /* نمایش فرم فعال */
        }

        .form-header {
            font-size: 16px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Grid Layout */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            text-align: right;
            background-color: white;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #3170b9;
            box-shadow: 0 0 0 2px rgba(49, 112, 185, 0.2);
        }

        /* Footer Link */
        .footer-link {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            font-weight: bold;
            color: #1e3a8a;
            font-size: 14px;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .grid-4 { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <select class="select-customer">
        <option>علی حسن‌زاده Niari (ATC-101)</option>
    </select>
    
    <button class="btn-full">👤 تعریف پرونده مشتری جدید</button>
    
    <div class="selected-customer-box">
        <span>صنف: کارگو و بازرگانی (Atana Trading)</span>
        <span style="font-size: 16px;">پرونده منتخب: <strong>علی حسن‌زاده Niari</strong></span>
    </div>

    <div class="tabs">
        <a id="tab-finance" class="tab active" onclick="switchTab('finance')">🧾 صدور فاکتور / ثبت سند مالی</a>
        <a id="tab-logistic" class="tab" onclick="switchTab('logistic')">📦 ارسال بار جدید (لجستیک چین)</a>
        <a class="tab">🚚 بارهای ارسال‌شده مشتری</a>
    </div>

    <div id="form-finance" class="form-container active-form">
        <div class="form-header">➕ ثبت سند جدید دریافت / پرداخت / فاکتور متفرقه</div>
        
        <div class="grid-4">
            <div class="form-group">
                <label>شرح تراکنش (بابت)</label>
                <input type="text" placeholder="مثال: حواله خرید لوازم یدکی از کارخانه">
            </div>
            <div class="form-group">
                <label>دسته‌بندی</label>
                <select>
                    <option>متفرقه</option>
                    <option>دریافت از مشتری</option>
                    <option>پرداخت به کارخانه</option>
                </select>
            </div>
            <div class="form-group">
                <label>نوع ارز</label>
                <select>
                    <option>یوان (CNY)</option>
                    <option>دلار (USD)</option>
                    <option>درهم (AED)</option>
                    <option>تومان (IRT)</option>
                </select>
            </div>
            <div class="form-group">
                <label>مقدار ارز (دریافت مثبت / بدهی منفی)</label>
                <input type="text" placeholder="مثال: -15000">
            </div>
        </div>
        
        <div class="grid-4">
            <div class="form-group">
                <label>نرخ برابری با یوان</label>
                <input type="text" value="1">
            </div>
        </div>

        <button class="btn-full btn-dark" style="margin-bottom: 0;">ثبت سند آنلاین در پرونده</button>
    </div>

    <div id="form-logistic" class="form-container">
        <div class="form-header" style="color: #1e3a8a;">📦 ثبت بار ارسالی جدید (لجستیک چین) و تولید اتوماتیک بدهی</div>
        
        <div class="grid-4">
            <div class="form-group">
                <label>کد رهگیری شیپمنت (Shipment Code)</label>
                <input type="text" placeholder="مثلا: 125">
            </div>
            <div class="form-group">
                <label>شماره فاکتور / شماره سند (Invoice No)</label>
                <input type="text" placeholder="مثلا: 255">
            </div>
            <div class="form-group">
                <label>نام و شرح کالا</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>تعداد کارتن (عدد)</label>
                <input type="number">
            </div>

            <div class="form-group">
                <label>وزن بار (کیلوگرم)</label>
                <input type="number">
            </div>
            <div class="form-group">
                <label>حجم بار (CBM - متر مکعب)</label>
                <input type="number">
            </div>
            <div class="form-group">
                <label>نرخ اعلامی به مشتری (یوان)</label>
                <input type="number">
            </div>
            <div class="form-group">
                <label>نام خط کشتیرانی (Shipping Line)</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>نرخ کشتیرانی به من (خرید ما - یوان)</label>
                <input type="number">
            </div>
            <div class="form-group">
                <label>هزینه داخلی چین (یوان)</label>
                <input type="number">
            </div>
            <div class="form-group">
                <label>هزینه داخلی مقصد / ترخیص (تومان)</label>
                <input type="number">
            </div>
            <div class="form-group">
                </div>
        </div>

        <button class="btn-full" style="margin-bottom: 0;">ارسال نهایی بار و ثبت زنجیره‌ای اسناد مالی</button>
    </div>

    <div class="footer-link">
        📊 گردش تفصیلی پرونده مشتری فعال
    </div>
</div>

<script>
    // تابع برای جابجایی بین تب‌ها
    function switchTab(tabName) {
        // حذف کلاس active از همه تب‌ها
        document.getElementById('tab-finance').classList.remove('active');
        document.getElementById('tab-logistic').classList.remove('active');
        
        // مخفی کردن همه فرم‌ها
        document.getElementById('form-finance').classList.remove('active-form');
        document.getElementById('form-logistic').classList.remove('active-form');

        // فعال کردن تب و فرم انتخاب شده
        if (tabName === 'finance') {
            document.getElementById('tab-finance').classList.add('active');
            document.getElementById('form-finance').classList.add('active-form');
        } else if (tabName === 'logistic') {
            document.getElementById('tab-logistic').classList.add('active');
            document.getElementById('form-logistic').classList.add('active-form');
        }
    }
</script>

</body>
</html>
